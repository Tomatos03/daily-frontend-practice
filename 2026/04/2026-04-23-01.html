<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background-color: #1a1a2e;
                color: #e0e0e0;
            }
            .music-card {
                padding: 20px;
                height: 380px;
                width: 280px;
                background-color: #16213e;
                border-radius: 10px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
                display: flex;
                flex-direction: column;
                transition: all 0.3s ease;
            }
            .music-card:hover {
                box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
                transform: translateY(-8px);
            }
            .music-info {
                flex: 1;
                display: flex;
                gap: 20px;
                justify-content: space-around;
                align-items: center;
            }
            .music-control {
                height: 100px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 20px;
            }

            .music-control > div {
                width: 40px;
                height: 40px;
                background-color: #e94560;
                border-radius: 50%;
                margin: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .music-control .pause-or-run {
                width: 50px;
                height: 50px;
                background-color: #e94560;
                border-radius: 50%;
                transition: all 0.3s ease;
            }
            .music-control .pause-or-run:hover {
                background-color: #963c4b;
            }
            
            
            .line {
                height: 1px;
                background-color: white;
            }
            .progress {
                flex-direction: column;
            }
            .song-info {
                flex: 1;
            }
            .music-control .prev::before {
                content: "";
                width: 0;
                height: 0;
                border-top: 8px solid transparent;
                border-bottom: 8px solid transparent;
                border-right: 10px solid white;
                transform: translateX(-25%);
            }
            .music-control .next::before {
                content: "";
                width: 0;
                height: 0;
                border-top: 8px solid transparent;
                border-bottom: 8px solid transparent;
                border-left: 10px solid white;
                transform: translateX(25%);
            }
            .music-control .pause-or-run::before {
                content: "";
                width: 15px;
                height: 15px;
                background-color: white;
            }

            .music-album {
                width: 120px;
                margin-left: 10px;
                height: 120px;
                border-radius: 50%;
                border: 2px solid #e94560;
                background: linear-gradient(135deg, #e94560, #0f3460);
                flex-shrink: 0;
                animation: play 5s linear infinite;
            }
            .music-album:hover {
                animation-play-state: paused;
            }
            @keyframes play {
                0% {
                    transform: rotate(0deg);
                }
                50% {
                    transform: rotate(180deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
            .progress-bar {
                width: 100%;
                height: 5px;
                background-color: #e0e0e0;
                border-radius: 5px;
                overflow: hidden;
                margin-top: 10px;
            }

            .progress-bar .progress {
                width: 30%;
                height: 5px;
                background-color: #e94560;
            }
            .time-text {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
        </style>
    </head>
    <body>
        <div class="music-card">
            <div class="music-info">
                <div class="music-album">
                </div>
                <div class="song-info">
                    <h2>Song Title</h3>
                    <div class="line"></div>
                    <p>Artist Name</p>
                    <div class="time-text">
                        <span class="start">01:22</span>
                        <span class="end">03:45</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress"></div>
                    </div>
                </div>
            </div>
            <div class="music-control">
                <div class="prev"></div>
                <div class="pause-or-run"></div>
                <div class="next"></div>
            </div>
        </div>
    </body>
</html>
